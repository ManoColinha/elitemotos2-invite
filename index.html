<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Motos 2 - Convite</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: Arial, sans-serif; text-align: center; padding-top: 50px; }
        .btn { background-color: #00FF00; color: #000; padding: 15px 30px; text-decoration: none; font-size: 18px; font-weight: bold; border-radius: 8px; display: inline-block; margin-top: 20px; border: none; }
        .loader { border: 4px solid #333; border-top: 4px solid #00FF00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2>Abrindo Elite Motos 2...</h2>
    <div class="loader"></div>
    <p>Se o jogo não abrir automaticamente, clique no botão abaixo:</p>
    
    <a id="jogarBtn" href="#" class="btn">Abrir Jogo Agora</a>

    <script>
        // Extrai o ID da URL do navegador (ex: https://seunome.github.io/elitemotos2-convite/?id=XYZ)
        const urlParams = new URLSearchParams(window.location.search);
        const playerId = urlParams.get('id');

        if (playerId) {
            // Monta o URI Scheme nativo que configuramos na Unity (Passo 1 anterior)
            const appLink = "elitemotos2://add?id=" + playerId;
            
            // Injeta o link no botão de fallback
            document.getElementById("jogarBtn").href = appLink;

            // Dispara o comando para o Android/iOS abrir o jogo imediatamente
            window.location.replace(appLink);
        } else {
            document.body.innerHTML = "<h2>Ops! ID de jogador não encontrado.</h2><p>Peça para seu amigo enviar o link novamente.</p>";
        }
    </script>
</body>
</html>

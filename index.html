<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Motos 2 - Convite</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: Arial, sans-serif; text-align: center; padding-top: 50px; }
        .btn { background-color: #00FF00; color: #000; padding: 15px 30px; text-decoration: none; font-size: 18px; font-weight: bold; border-radius: 8px; display: inline-block; margin-top: 20px; border: none; cursor: pointer; }
        .loader { border: 4px solid #333; border-top: 4px solid #00FF00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2>Abrindo Elite Motos 2...</h2>
    <div class="loader"></div>
    <p>Se o jogo não abrir automaticamente, clique no botão abaixo:</p>
    
    <a id="jogarBtn" href="#" class="btn">Abrir Jogo Agora</a>

    <script>
        // Aguarda a página carregar para evitar bloqueios do Safari
        window.onload = function() {
            // Extrai o ID da URL do navegador
            const urlParams = new URLSearchParams(window.location.search);
            const playerId = urlParams.get('id');

            if (playerId) {
                // Monta o URI Scheme nativo da Unity
                const appLink = "elitemotos2://add?id=" + playerId;
                
                // Injeta o link no botão verde (para caso o cara precise clicar)
                document.getElementById("jogarBtn").href = appLink;

                // O PULO DO GATO PARA O iOS:
                // Usa setTimeout e href em vez de replace para o Safari não bloquear.
                setTimeout(function() {
                    window.location.href = appLink;
                }, 500);

            } else {
                document.body.innerHTML = "<h2>Ops! Convite Inválido.</h2><p>O link parece estar quebrado ou incompleto.</p>";
            }
        };
    </script>
</body>
</html>

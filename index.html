<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Motos 2 - Convite</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: Arial, sans-serif; text-align: center; padding-top: 50px; }
        .btn { background-color: #00FF00; color: #000; padding: 15px 30px; text-decoration: none; font-size: 18px; font-weight: bold; border-radius: 8px; display: inline-block; margin-top: 20px; border: none; cursor: pointer; }
        .loader { border: 4px solid #333; border-top: 4px solid #00FF00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        .warning { background-color: #ffcc00; color: #000; padding: 10px; margin: 20px; border-radius: 5px; font-weight: bold; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2>Abrindo Elite Motos 2...</h2>
    
    <div id="ios-warning" class="warning">
        ⚠️ Se você está no Telegram/Instagram, clique nos 3 pontinhos (ou no ícone da bússola) e escolha "Abrir no Safari" / "Navegador Padrão".
    </div>

    <div class="loader"></div>
    <p>Se o jogo não abrir automaticamente, clique no botão abaixo:</p>
    
    <a id="jogarBtn" href="#" class="btn">Abrir Jogo Agora</a>

    <script>
        window.onload = function() {
            // Detecta se é iOS para mostrar o aviso do Safari
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            if (isIOS) {
                document.getElementById('ios-warning').style.display = 'block';
            }

            const urlParams = new URLSearchParams(window.location.search);
            const playerId = urlParams.get('id');

            if (playerId) {
                const appLink = "elitemotos2://add?id=" + playerId;
                document.getElementById("jogarBtn").href = appLink;

                // Tenta forçar a abertura
                setTimeout(function() {
                    window.location.href = appLink;
                }, 800);
            } else {
                document.body.innerHTML = "<h2>Ops! Convite Inválido.</h2><p>O link parece estar quebrado.</p>";
            }
        };
    </script>
</body>
</html>
